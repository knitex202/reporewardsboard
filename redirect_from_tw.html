<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repo Viewer Spawns OAuth Redirect</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #070b10;
      color: #f2f6f8;
      font-family: Bahnschrift, "Segoe UI", sans-serif;
    }

    .card {
      width: min(680px, calc(100vw - 48px));
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #11161d;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      color: #ff5a1f;
      font-size: 28px;
    }

    p {
      margin: 0 0 12px;
      color: #c8d1d8;
      line-height: 1.5;
    }

    code {
      display: block;
      margin-top: 14px;
      padding: 10px 12px;
      background: #090d13;
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow-wrap: anywhere;
      color: #7be0cb;
      font-family: "Cascadia Mono", Consolas, monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Returning to the desktop app...</h1>
    <p id="status">If Repo Viewer Spawns Desktop is running, this page will forward the Twitch response to the local app automatically.</p>
    <code id="target"></code>
  </div>
  <script>
    (function () {
      const localCallback = "http://localhost:3000/";
      const query = window.location.search || "";
      const hash = window.location.hash ? window.location.hash.slice(1) : "";
      const payload = query.length > 1 ? query.slice(1) : hash;
      const status = document.getElementById("status");
      const target = document.getElementById("target");

      if (!payload) {
        status.textContent = "No Twitch auth payload was found in this redirect.";
        target.textContent = window.location.href;
        return;
      }

      const forwardUrl = localCallback + "?" + payload;
      target.textContent = forwardUrl;
      window.location.replace(forwardUrl);
    })();
  </script>
</body>
</html>
